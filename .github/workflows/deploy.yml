name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".vibe/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Write deployment record
        if: always() && steps.deploy.outcome != 'skipped'
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            DEPLOY_STATUS="success"
          else
            DEPLOY_STATUS="failed"
          fi

          EXISTING=$(find .vibe/deployments -name '*.yaml' 2>/dev/null | wc -l | tr -d ' ')
          NEXT_SEQ=$((EXISTING + 1))
          PADDED=$(printf '%03d' "$NEXT_SEQ")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ "$DEPLOY_STATUS" = "success" ]; then
            FILENAME="${PADDED}-deploy.yaml"
          else
            FILENAME="${PADDED}-failed.yaml"
          fi

          printf '%s\n' \
            "sequence: ${NEXT_SEQ}" \
            "type: deploy" \
            "commit_sha: ${GITHUB_SHA}" \
            "timestamp: ${TIMESTAMP}" \
            "triggered_by: github-actions" \
            "status: ${DEPLOY_STATUS}" \
            "services_deployed:" \
            "  - type: worker" \
            > ".vibe/deployments/${FILENAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".vibe/deployments/${FILENAME}"
          git commit -m "chore: record deployment ${PADDED} [skip ci]"
          git pull --rebase origin main
          git push
